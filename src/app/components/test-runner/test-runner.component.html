<div class="test-runner">
  <!-- 1. Configuration Panel -->
  <app-test-config-panel
    [configs]="configs()"
    [isTesting]="niah.isTesting()"
    [(selectedTargetId)]="selectedTargetId"
    [(selectedJudgeId)]="selectedJudgeId"
    [(selectedLanguage)]="selectedLanguage"
    [(selectedContext)]="selectedContext"
    (profileChange)="onProfileChange($event)"
    (startTest)="start()">
  </app-test-config-panel>

  <!-- 2. Execution Status -->
  <app-test-execution-status></app-test-execution-status>

  <!-- 3. Results Table -->
  <app-test-results-table
    [(copyHaystack)]="copyHaystack"
    [(copyStandard)]="copyStandard"
    [(copyNeedle)]="copyNeedle"
    (selectResult)="selectedResult.set($event)"
    (viewHaystack)="showHaystack.set(true)"
    (copyReport)="copyReport()">
  </app-test-results-table>

  <!-- 4. Result Detail Modal -->
  @if (selectedResult(); as res) {
    <app-result-detail-modal
      [result]="res"
      (close)="selectedResult.set(null)">
    </app-result-detail-modal>
  }

  <!-- Haystack Viewer Modal -->
  @if (showHaystack()) {
    <app-haystack-viewer-modal
      [haystack]="niah.lastHaystack()"
      (close)="showHaystack.set(false)">
    </app-haystack-viewer-modal>
  }
</div>
